<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">PASS WARN BLOCK downstream gate</title>
  <desc id="desc">Original QE-Learning diagram showing how output evidence, source boundary and uncertainty statement determine PASS, WARN or BLOCK downstream decisions.</desc>
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .pass { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 10; }
      .warn { fill: #fffbeb; stroke: #b45309; stroke-width: 2; rx: 10; }
      .block { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 10; }
      .txt { font-family: Arial, sans-serif; fill: #0f172a; font-size: 18px; }
      .small { font-family: Arial, sans-serif; fill: #334155; font-size: 14px; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569" />
    </marker>
  </defs>
  <rect x="35" y="45" width="235" height="110" class="box" />
  <text x="65" y="84" class="txt">Output evidence</text>
  <text x="65" y="112" class="small">convergence, warnings, files</text>
  <text x="65" y="135" class="small">input echo and data chain</text>
  <rect x="35" y="205" width="235" height="110" class="box" />
  <text x="65" y="244" class="txt">Source boundary</text>
  <text x="65" y="272" class="small">official docs, literature</text>
  <text x="65" y="295" class="small">tool and version limits</text>
  <rect x="345" y="125" width="255" height="110" class="box" />
  <text x="382" y="164" class="txt">Review decision</text>
  <text x="382" y="192" class="small">evidence + boundary + goal</text>
  <text x="382" y="215" class="small">not just JOB DONE</text>
  <rect x="685" y="35" width="235" height="78" class="pass" />
  <text x="725" y="70" class="txt">PASS</text>
  <text x="725" y="94" class="small">specific downstream allowed</text>
  <rect x="685" y="141" width="235" height="78" class="warn" />
  <text x="725" y="176" class="txt">WARN</text>
  <text x="725" y="200" class="small">trend, debug or bounded use</text>
  <rect x="685" y="247" width="235" height="78" class="block" />
  <text x="725" y="282" class="txt">BLOCK</text>
  <text x="725" y="306" class="small">stop downstream and repair</text>
  <path d="M270 100 C300 100 310 150 345 165" class="arrow" />
  <path d="M270 260 C300 260 310 210 345 195" class="arrow" />
  <path d="M600 170 C630 105 650 76 685 74" class="arrow" />
  <path d="M600 180 C630 180 650 180 685 180" class="arrow" />
  <path d="M600 190 C630 255 650 286 685 286" class="arrow" />
</svg>
