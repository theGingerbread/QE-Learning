<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">QE electronic workflow chain</title>
  <desc id="desc">A schematic electronic-structure workflow showing final static SCF feeding either band-path calculation, dense NSCF for DOS/PDOS/Fermi surface, or pp.x potential and charge-density post-processing.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #344054; stroke-width: 2; rx: 10; }
      .gate { fill: #eef6ff; stroke: #175cd3; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #101828; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #344054; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>
  <rect x="40" y="205" width="190" height="90" class="gate"/>
  <text x="135" y="240" text-anchor="middle" class="text">Final static SCF</text>
  <text x="135" y="267" text-anchor="middle" class="small">trusted prefix/outdir</text>
  <rect x="310" y="60" width="190" height="100" class="box"/>
  <text x="405" y="98" text-anchor="middle" class="text">Bands path</text>
  <text x="405" y="125" text-anchor="middle" class="small">pw.x bands</text>
  <text x="405" y="145" text-anchor="middle" class="small">K_POINTS path</text>
  <rect x="310" y="210" width="190" height="100" class="box"/>
  <text x="405" y="248" text-anchor="middle" class="text">Dense NSCF</text>
  <text x="405" y="275" text-anchor="middle" class="small">uniform k mesh</text>
  <text x="405" y="295" text-anchor="middle" class="small">nbnd / occupations</text>
  <rect x="310" y="360" width="190" height="100" class="box"/>
  <text x="405" y="398" text-anchor="middle" class="text">pp.x fields</text>
  <text x="405" y="425" text-anchor="middle" class="small">density / potential</text>
  <rect x="585" y="55" width="170" height="90" class="warn"/>
  <text x="670" y="90" text-anchor="middle" class="text">bands.x</text>
  <text x="670" y="117" text-anchor="middle" class="small">dispersion plot</text>
  <rect x="585" y="190" width="170" height="90" class="warn"/>
  <text x="670" y="225" text-anchor="middle" class="text">dos.x</text>
  <text x="670" y="252" text-anchor="middle" class="small">total DOS</text>
  <rect x="585" y="310" width="170" height="90" class="warn"/>
  <text x="670" y="345" text-anchor="middle" class="text">projwfc.x / fs.x</text>
  <text x="670" y="372" text-anchor="middle" class="small">PDOS / Fermi surface</text>
  <rect x="585" y="425" width="170" height="70" class="warn"/>
  <text x="670" y="454" text-anchor="middle" class="text">average.x</text>
  <text x="670" y="478" text-anchor="middle" class="small">potential profile</text>
  <rect x="835" y="205" width="230" height="100" class="gate"/>
  <text x="950" y="243" text-anchor="middle" class="text">Output review</text>
  <text x="950" y="270" text-anchor="middle" class="small">energy reference / mesh /</text>
  <text x="950" y="290" text-anchor="middle" class="small">projection / plateau</text>
  <path d="M230,235 C260,165 280,105 310,105" class="arrow"/>
  <path d="M230,250 C260,250 280,260 310,260" class="arrow"/>
  <path d="M230,280 C260,350 280,410 310,410" class="arrow"/>
  <path d="M500,105 C530,105 555,100 585,100" class="arrow"/>
  <path d="M500,250 C530,235 555,235 585,235" class="arrow"/>
  <path d="M500,270 C530,330 555,355 585,355" class="arrow"/>
  <path d="M500,410 C530,440 555,460 585,460" class="arrow"/>
  <path d="M755,100 C790,120 805,210 835,235" class="arrow"/>
  <path d="M755,235 C790,235 805,245 835,250" class="arrow"/>
  <path d="M755,355 C790,340 805,290 835,275" class="arrow"/>
  <path d="M755,460 C800,430 810,310 835,290" class="arrow"/>
  <rect x="165" y="20" width="790" height="25" class="note"/>
  <text x="560" y="38" text-anchor="middle" class="small">Band path visualizes dispersion; dense uniform mesh supports DOS, PDOS and Fermi-surface evidence.</text>
</svg>
