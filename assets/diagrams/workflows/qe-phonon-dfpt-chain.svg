<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="560" viewBox="0 0 1240 560" role="img" aria-labelledby="title desc">
  <title id="title">QE phonon DFPT workflow chain</title>
  <desc id="desc">A schematic chain for QE phonon DFPT calculations from relaxed structure through final static SCF, ph.x q-grid dynamical matrices, q2r.x force constants, matdyn.x q-path or DOS interpolation, and output review, with fildyn and flfrc file boundaries and ASR shown as a post-processing constraint.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #344054; stroke-width: 2; rx: 10; }
      .gate { fill: #eef6ff; stroke: #175cd3; stroke-width: 2; rx: 10; }
      .file { fill: #f0fdf4; stroke: #15803d; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .review { fill: #fefce8; stroke: #a16207; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 17px; fill: #101828; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #344054; }
      .tiny { font-family: Arial, sans-serif; font-size: 12px; fill: #475467; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #667085; stroke-width: 1.7; fill: none; marker-end: url(#arrow); stroke-dasharray: 5 5; }
      .note { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect x="35" y="190" width="165" height="95" class="box"/>
  <text x="117.5" y="225" text-anchor="middle" class="text">Relaxed structure</text>
  <text x="117.5" y="251" text-anchor="middle" class="small">forces / stress</text>
  <text x="117.5" y="271" text-anchor="middle" class="small">already reviewed</text>

  <rect x="245" y="190" width="175" height="95" class="gate"/>
  <text x="332.5" y="225" text-anchor="middle" class="text">Final static SCF</text>
  <text x="332.5" y="251" text-anchor="middle" class="small">trusted prefix/outdir</text>
  <text x="332.5" y="271" text-anchor="middle" class="small">fresh data edge</text>

  <rect x="470" y="175" width="180" height="125" class="gate"/>
  <text x="560" y="210" text-anchor="middle" class="text">ph.x q-grid</text>
  <text x="560" y="236" text-anchor="middle" class="small">selected q-grid</text>
  <text x="560" y="256" text-anchor="middle" class="small">perturbation</text>
  <text x="560" y="276" text-anchor="middle" class="small">convergence</text>

  <rect x="700" y="80" width="170" height="82" class="file"/>
  <text x="785" y="113" text-anchor="middle" class="text">fildyn boundary</text>
  <text x="785" y="138" text-anchor="middle" class="small">dyn0 + dyn files</text>

  <rect x="705" y="210" width="160" height="90" class="box"/>
  <text x="785" y="245" text-anchor="middle" class="text">q2r.x</text>
  <text x="785" y="271" text-anchor="middle" class="small">dyn grid to IFC</text>

  <rect x="700" y="350" width="170" height="82" class="file"/>
  <text x="785" y="383" text-anchor="middle" class="text">flfrc boundary</text>
  <text x="785" y="408" text-anchor="middle" class="small">real-space IFC</text>

  <rect x="925" y="175" width="180" height="125" class="warn"/>
  <text x="1015" y="210" text-anchor="middle" class="text">matdyn.x</text>
  <text x="1015" y="236" text-anchor="middle" class="small">q-path frequencies</text>
  <text x="1015" y="256" text-anchor="middle" class="small">or DOS mesh</text>
  <text x="1015" y="276" text-anchor="middle" class="small">uses current IFC</text>

  <rect x="925" y="365" width="180" height="70" class="note"/>
  <text x="1015" y="392" text-anchor="middle" class="small">ASR belongs here:</text>
  <text x="1015" y="414" text-anchor="middle" class="small">constraint / diagnostic</text>

  <rect x="1135" y="190" width="80" height="95" class="review"/>
  <text x="1175" y="225" text-anchor="middle" class="text">Output</text>
  <text x="1175" y="250" text-anchor="middle" class="text">review</text>
  <text x="1175" y="273" text-anchor="middle" class="tiny">PASS/WARN</text>

  <path d="M200,238 C218,238 228,238 245,238" class="arrow"/>
  <path d="M420,238 C438,238 452,238 470,238" class="arrow"/>
  <path d="M650,218 C675,170 685,123 700,123" class="arrow"/>
  <path d="M650,255 C670,255 685,255 705,255" class="arrow"/>
  <path d="M870,123 C902,145 910,205 925,218" class="soft-arrow"/>
  <path d="M865,255 C888,255 902,255 925,255" class="arrow"/>
  <path d="M785,300 C785,320 785,335 785,350" class="arrow"/>
  <path d="M870,392 C898,360 910,293 925,274" class="arrow"/>
  <path d="M1015,365 C1015,340 1015,320 1015,300" class="soft-arrow"/>
  <path d="M1105,238 C1117,238 1126,238 1135,238" class="arrow"/>

  <rect x="210" y="25" width="820" height="38" class="note"/>
  <text x="620" y="49" text-anchor="middle" class="small">File identity is part of the evidence: do not mix fildyn, flfrc or ASR settings across structures, SCF data or q-grids.</text>

  <rect x="250" y="480" width="740" height="48" class="note"/>
  <text x="620" y="510" text-anchor="middle" class="small">ASR can constrain acoustic behavior during post-processing; it cannot repair unrelaxed structures, weak SCF evidence or missing dyn files.</text>
</svg>
