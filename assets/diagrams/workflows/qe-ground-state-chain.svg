<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">QE ground-state workflow chain</title>
  <desc id="desc">A schematic chain from structure and pseudopotential inputs through SCF, convergence, relaxation, final static SCF, NSCF and downstream readiness gates.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #344054; stroke-width: 2; rx: 10; }
      .gate { fill: #eef6ff; stroke: #175cd3; stroke-width: 2; rx: 10; }
      .warn { fill: #fff7ed; stroke: #c2410c; stroke-width: 2; rx: 10; }
      .text { font-family: Arial, sans-serif; font-size: 18px; fill: #101828; }
      .small { font-family: Arial, sans-serif; font-size: 14px; fill: #344054; }
      .arrow { stroke: #344054; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #98a2b3; stroke-width: 1.5; rx: 8; }
    </style>
  </defs>

  <rect x="30" y="70" width="180" height="90" class="box"/>
  <text x="120" y="105" text-anchor="middle" class="text">Structure</text>
  <text x="120" y="132" text-anchor="middle" class="small">cell + positions</text>

  <rect x="30" y="230" width="180" height="90" class="box"/>
  <text x="120" y="265" text-anchor="middle" class="text">Pseudopotential</text>
  <text x="120" y="292" text-anchor="middle" class="small">UPF + provenance</text>

  <rect x="270" y="150" width="170" height="100" class="gate"/>
  <text x="355" y="188" text-anchor="middle" class="text">pw.x SCF</text>
  <text x="355" y="215" text-anchor="middle" class="small">charge density</text>

  <rect x="500" y="60" width="190" height="100" class="warn"/>
  <text x="595" y="98" text-anchor="middle" class="text">Convergence</text>
  <text x="595" y="125" text-anchor="middle" class="small">cutoff / kmesh /</text>
  <text x="595" y="145" text-anchor="middle" class="small">occupations</text>

  <rect x="500" y="245" width="190" height="100" class="box"/>
  <text x="595" y="283" text-anchor="middle" class="text">relax / vc-relax</text>
  <text x="595" y="310" text-anchor="middle" class="small">forces + stress</text>

  <rect x="750" y="150" width="190" height="100" class="gate"/>
  <text x="845" y="188" text-anchor="middle" class="text">Final static SCF</text>
  <text x="845" y="215" text-anchor="middle" class="small">new data edge</text>

  <rect x="990" y="70" width="100" height="80" class="box"/>
  <text x="1040" y="103" text-anchor="middle" class="text">NSCF</text>
  <text x="1040" y="128" text-anchor="middle" class="small">dense mesh</text>

  <rect x="990" y="230" width="100" height="80" class="box"/>
  <text x="1040" y="263" text-anchor="middle" class="text">Downstream</text>
  <text x="1040" y="288" text-anchor="middle" class="small">bands / DOS</text>

  <path d="M210,115 C235,115 240,180 270,180" class="arrow"/>
  <path d="M210,275 C235,275 240,220 270,220" class="arrow"/>
  <path d="M440,178 C465,150 475,120 500,115" class="arrow"/>
  <path d="M440,222 C470,250 475,285 500,295" class="arrow"/>
  <path d="M690,295 C720,295 720,230 750,220" class="arrow"/>
  <path d="M690,110 C725,110 725,170 750,180" class="arrow"/>
  <path d="M940,180 C965,150 965,110 990,110" class="arrow"/>
  <path d="M940,220 C965,245 965,270 990,270" class="arrow"/>

  <rect x="270" y="380" width="670" height="70" class="note"/>
  <text x="605" y="410" text-anchor="middle" class="small">PASS / WARN / BLOCK is decided from output evidence, not from program completion alone.</text>
  <text x="605" y="433" text-anchor="middle" class="small">Relaxed structures require a final static SCF before electronic or phonon downstream claims.</text>
</svg>
